<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大亞國際行銷 — 庫存效期儀表板</title>
<style>
  :root{
    --green:#1D9E75; --green-d:#0F6E56;
    --bg:#ffffff; --surface:#f5f7f5; --line:#e3e8e3;
    --text:#1c2620; --muted:#5f6b63; --hint:#8a948c;
    --red-bg:#FCEBEB; --red-bd:#E24B4A; --red-tx:#791F1F;
    --amber-bg:#FAEEDA; --amber-bd:#EF9F27; --amber-tx:#633806;
    --green-bg:#EAF3DE; --green-bd:#97C459; --green-tx:#27500A;
    --radius:12px; --radius-sm:8px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:linear-gradient(180deg,#f3f8f5 0%,#ffffff 320px);
    min-height:100vh; color:var(--text);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px; margin:0 auto; padding:28px 20px 60px;}
  header{display:flex; align-items:center; gap:16px; padding-bottom:18px; border-bottom:1px solid var(--line); margin-bottom:24px;}
  .logo{width:52px; height:52px; border-radius:var(--radius-sm); background:linear-gradient(135deg,var(--green),var(--green-d)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:20px; letter-spacing:1px;}
  header h1{margin:0; font-size:20px; font-weight:700;}
  header p{margin:2px 0 0; font-size:13px; color:var(--muted);}
  .updated{margin-left:auto; font-size:12px; color:var(--hint); text-align:right;}
  .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:22px;}
  .card{border-radius:var(--radius-sm); padding:14px 16px;}
  .card .lab{margin:0; font-size:13px;}
  .card .val{margin:4px 0 0; font-size:26px; font-weight:700;}
  .c-neutral{background:var(--surface);} .c-neutral .lab{color:var(--muted);}
  .c-red{background:var(--red-bg);} .c-red .lab{color:#A32D2D;} .c-red .val{color:var(--red-tx);}
  .c-amber{background:var(--amber-bg);} .c-amber .lab{color:#854F0B;} .c-amber .val{color:var(--amber-tx);}
  .c-green{background:var(--green-bg);} .c-green .lab{color:#3B6D11;} .c-green .val{color:var(--green-tx);}
  .soon-box{background:var(--red-bg); border:1px solid #F09595; border-radius:var(--radius); padding:14px 18px; margin-bottom:24px;}
  .soon-box h2{margin:0 0 10px; font-size:15px; font-weight:700; color:var(--red-tx); display:flex; align-items:center; gap:6px;}
  .soon-filter{display:flex; flex-wrap:wrap; gap:18px; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid #F4C0C0;}
  .soon-filter label{display:flex; align-items:center; gap:6px; font-size:13px; color:#712B13; cursor:pointer; user-select:none;}
  .soon-filter input{width:16px; height:16px; accent-color:var(--red-bd); cursor:pointer;}
  .controls{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:18px;}
  input,select{font-family:inherit; font-size:14px; padding:8px 12px; border:1px solid var(--line); border-radius:var(--radius-sm); background:#fff; color:var(--text); height:38px;}
  input:focus,select:focus{outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(29,158,117,.15);}
  #q{flex:1; min-width:200px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{font-weight:500; text-align:left; padding:5px 6px; color:var(--muted);}
  td{padding:7px 6px;}
  .mono{font-family:"SFMono-Regular",Consolas,monospace;}
  .item-card{background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:14px 18px; margin-bottom:14px;}
  .item-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; gap:10px; flex-wrap:wrap;}
  .item-name{font-weight:700; font-size:16px;}
  .item-spec{font-size:13px; color:var(--muted); margin-left:6px;}
  .item-meta{font-size:12px; color:var(--hint);}
  .item-card table tr+tr td{border-top:1px solid var(--line);}
  .badge{display:inline-block; border-radius:var(--radius-sm); padding:2px 9px; font-size:12px; white-space:nowrap;}
  .b-red{background:var(--red-bg); color:var(--red-tx); border:1px solid var(--red-bd);}
  .b-amber{background:var(--amber-bg); color:var(--amber-tx); border:1px solid var(--amber-bd);}
  .b-green{background:var(--green-bg); color:var(--green-tx); border:1px solid var(--green-bd);}
  .b-ok{background:var(--surface); color:var(--muted); border:1px solid var(--line);}
  .b-none{background:var(--surface); color:var(--hint); border:1px solid var(--line);}
  .empty{color:var(--muted); font-size:14px; padding:16px 0;}
  .soon-row td{border-top:1px solid #F4C0C0;}
  footer{margin-top:30px; font-size:12px; color:var(--hint); text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">VA</div>
    <div>
      <h1>大亞國際行銷　庫存效期儀表板</h1>
      <p>Vast Asia International marketing co.,ltd. — 即期商品管理（唯讀檢視）</p>
    </div>
    <div class="updated" id="updated"></div>
  </header>

  <div class="cards">
    <div class="card c-neutral"><p class="lab">總品項</p><p class="val" id="m-total">0</p></div>
    <div class="card c-neutral"><p class="lab">總數量</p><p class="val" id="m-qty">0</p></div>
    <div class="card c-red"><p class="lab">剩 ≤ 1 個月</p><p class="val" id="m-red">0</p></div>
    <div class="card c-amber"><p class="lab">剩 ≤ 3 個月</p><p class="val" id="m-amber">0</p></div>
    <div class="card c-green"><p class="lab">剩 ≤ 6 個月</p><p class="val" id="m-green">0</p></div>
  </div>

  <div class="soon-box">
    <h2>⚠ 即將到期清單（依到期日排序）</h2>
    <div class="soon-filter">
      <label><input type="checkbox" id="f-over" checked> 已過期</label>
      <label><input type="checkbox" id="f-red"> 未過期且剩 ≤ 1 個月</label>
      <label><input type="checkbox" id="f-amber"> 超過 1 個月且剩 ≤ 3 個月</label>
      <label><input type="checkbox" id="f-green"> 超過 3 個月且剩 ≤ 6 個月</label>
    </div>
    <div id="soon"></div>
  </div>

  <div class="controls">
    <input id="q" type="text" placeholder="搜尋品號 / 品名 / 規格 / 批號…">
    <select id="wh"><option value="">全部倉別</option></select>
    <select id="lv">
      <option value="">全部效期</option>
      <option value="red">剩 ≤ 1 個月</option>
      <option value="amber">剩 ≤ 3 個月</option>
      <option value="green">剩 ≤ 6 個月</option>
      <option value="ok">6 個月以上</option>
      <option value="none">無效期</option>
    </select>
  </div>

  <div id="rows"></div>

  <footer>資料來源：庫存效期試算表　·　本頁為唯讀檢視，如需更新資料請洽管理人員</footer>
</div>

<script>
/* =========================================================================
   資料來源設定
   -------------------------------------------------------------------------
   方式 A（預設）：直接用下方 DATA 陣列的範例資料。
   方式 B：改讀 Google Sheet。把 USE_GOOGLE_SHEET 設為 true，
           並填入你發佈的 CSV 網址（見隨附說明文件第 2 步）。
   ========================================================================= */
var USE_GOOGLE_SHEET = true;
var SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTK8wPy3m9aCy5XVK6tXKXTaYpGoaW6Ir17yPC1HeHkl7-K-_Mkh0rxydiN1QKhYrBMTkaQI5fj7MiW/pub?gid=838757881&single=true&output=csv";

/* 範例資料。欄位：品號 品名 規格 倉別 主儲位 副儲位 批號 數量 效期(YYYY-MM-DD) */
var DATA = [
  {code:"VA-1001", name:"高鈣鮮乳", spec:"936ml/瓶", wh:"A倉", loc1:"A-03-12", loc2:"A-03-13", lot:"LOT2406A", qty:120, exp:"2026-06-18"},
  {code:"VA-1001", name:"高鈣鮮乳", spec:"936ml/瓶", wh:"A倉", loc1:"A-03-13", loc2:"", lot:"LOT2405B", qty:64, exp:"2026-08-05"},
  {code:"VA-1042", name:"冷壓初榨橄欖油", spec:"500ml/瓶", wh:"B倉", loc1:"B-01-04", loc2:"B-01-05", lot:"LOT2312X", qty:38, exp:"2026-07-22"},
  {code:"VA-1042", name:"冷壓初榨橄欖油", spec:"500ml/瓶", wh:"B倉", loc1:"B-01-05", loc2:"", lot:"LOT2401Y", qty:90, exp:"2026-11-30"},
  {code:"VA-2210", name:"日式胡麻醬", spec:"240g/瓶 ×12/箱", wh:"A倉", loc1:"A-07-02", loc2:"A-07-03", lot:"LOT2408C", qty:210, exp:"2026-09-12"},
  {code:"VA-2210", name:"日式胡麻醬", spec:"240g/瓶 ×12/箱", wh:"C倉", loc1:"C-02-09", loc2:"", lot:"LOT2403D", qty:55, exp:"2026-06-09"},
  {code:"VA-3055", name:"有機燕麥片", spec:"800g/袋", wh:"C倉", loc1:"C-05-11", loc2:"C-05-12", lot:"LOT2310E", qty:148, exp:"2027-02-01"},
  {code:"VA-3055", name:"有機燕麥片", spec:"800g/袋", wh:"B倉", loc1:"B-04-07", loc2:"", lot:"LOT2402F", qty:33, exp:"2026-08-28"},
  {code:"VA-4180", name:"綜合堅果隨手包", spec:"35g/包 ×24/箱", wh:"A倉", loc1:"A-09-15", loc2:"A-09-16", lot:"LOT2407G", qty:480, exp:"2026-06-30"},
  {code:"VA-5320", name:"冷凍藍莓", spec:"1kg/袋", wh:"D倉(冷凍)", loc1:"D-01-01", loc2:"", lot:"LOT2404H", qty:72, exp:"2026-12-15"}
];

var today = new Date(); today.setHours(0,0,0,0);
function hasExp(it){ return it.exp && it.exp.trim()!=="" && !isNaN(new Date(it.exp)); }
function monthsLeft(exp){ return (new Date(exp)-today)/(1000*60*60*24*30.44); }
function daysLeft(exp){ return Math.round((new Date(exp)-today)/(1000*60*60*24)); }
function level(it){ if(!hasExp(it)) return "none"; var m=monthsLeft(it.exp); if(m<=1) return "red"; if(m<=3) return "amber"; if(m<=6) return "green"; return "ok"; }
function locText(it){ return (it.loc2 && it.loc2.trim()!=="") ? it.loc1+" / "+it.loc2 : (it.loc1||"—"); }
function lotText(it){ return (it.lot && it.lot.trim()!=="") ? it.lot : "—"; }
function expText(it){ return hasExp(it) ? it.exp : "無效期"; }
var LABEL={red:"≤1個月",amber:"≤3個月",green:"≤6個月",ok:"充足",none:"無效期"};

function parseCSV(text){
  var lines = text.replace(/\r/g,"").split("\n").filter(function(l){return l.trim()!=="";});
  var rows = lines.map(function(line){
    var out=[], cur="", inq=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(ch==='"'){ if(inq && line[i+1]==='"'){cur+='"';i++;} else inq=!inq; }
      else if(ch===',' && !inq){ out.push(cur); cur=""; }
      else cur+=ch;
    }
    out.push(cur); return out;
  });
  rows.shift(); /* 移除標題列 */
  return rows.map(function(c){
    return {code:(c[0]||"").trim(), name:(c[1]||"").trim(), spec:(c[2]||"").trim(),
            wh:(c[3]||"").trim(), loc1:(c[4]||"").trim(), loc2:(c[5]||"").trim(),
            lot:(c[6]||"").trim(), qty:parseInt((c[7]||"0").replace(/[^\d-]/g,""),10)||0,
            exp:(c[8]||"").trim()};
  }).filter(function(r){return r.code!=="" && r.name!=="";});
}

function boot(data){
  window.__DATA__ = data;
  var whSel=document.getElementById("wh");
  Array.from(new Set(data.map(function(r){return r.wh;}))).forEach(function(w){
    if(!w) return; var o=document.createElement("option"); o.value=w; o.textContent=w; whSel.appendChild(o);
  });
  document.getElementById("updated").textContent = "更新時間：" +
    today.getFullYear()+"/"+(today.getMonth()+1)+"/"+today.getDate();
  document.getElementById("q").addEventListener("input",render);
  whSel.addEventListener("change",render);
  document.getElementById("lv").addEventListener("change",render);
  document.getElementById("f-over").addEventListener("change",renderSoon);
  document.getElementById("f-red").addEventListener("change",renderSoon);
  document.getElementById("f-amber").addEventListener("change",renderSoon);
  document.getElementById("f-green").addEventListener("change",renderSoon);
  renderSoon(); render();
}

function overdueText(d){
  var n=Math.abs(d);
  var y=Math.floor(n/365), rem=n%365;
  if(y>0) return "已過期 "+y+" 年又 "+rem+" 天";
  return "已過期 "+n+" 天";
}

function renderSoon(){
  var data=window.__DATA__, soon=document.getElementById("soon");
  var fOver=document.getElementById("f-over").checked;
  var fRed=document.getElementById("f-red").checked;
  var fAmber=document.getElementById("f-amber").checked;
  var fGreen=document.getElementById("f-green").checked;
  if(!fOver && !fRed && !fAmber && !fGreen){ soon.innerHTML='<p style="margin:0;font-size:13px;color:#A32D2D;">請至少勾選一個範圍。</p>'; return; }

  function inRange(r){
    if(r.d<0) return fOver;                 // 已過期
    if(r.m<=1) return fRed;                 // 未過期且剩≤1個月
    if(r.m<=3) return fAmber;               // 超過1個月且剩≤3個月
    if(r.m<=6) return fGreen;               // 超過3個月且剩≤6個月
    return false;                           // 超過6個月不列入
  }

  var list=data.filter(hasExp).map(function(r){return Object.assign({},r,{m:monthsLeft(r.exp),d:daysLeft(r.exp)});})
               .filter(inRange).sort(function(a,b){return a.d-b.d;});
  if(!list.length){ soon.innerHTML='<p style="margin:0;font-size:13px;color:#A32D2D;">所選範圍內目前沒有品項。</p>'; return; }

  var h='<table><tr style="color:#993C1D;text-align:left;">'
    +'<th style="font-weight:500;padding:5px 6px;">品號</th>'
    +'<th style="font-weight:500;padding:5px 6px;">品名</th>'
    +'<th style="font-weight:500;padding:5px 6px;">倉別</th>'
    +'<th style="font-weight:500;padding:5px 6px;">儲位</th>'
    +'<th style="font-weight:500;padding:5px 6px;text-align:right;">數量</th>'
    +'<th style="font-weight:500;padding:5px 6px;">到期日</th>'
    +'<th style="font-weight:500;padding:5px 6px;text-align:right;">狀態</th></tr>';
  list.forEach(function(it){
    var tx=it.m<=1?"var(--red-tx)":(it.m<=3?"var(--amber-tx)":"var(--green-tx)");
    var dtxt = it.d<0 ? overdueText(it.d) : ("剩 "+it.d+" 天");
    h+='<tr class="soon-row">'
      +'<td class="mono" style="color:#712B13;padding:7px 6px;">'+it.code+'</td>'
      +'<td style="color:#4A1B0C;padding:7px 6px;">'+it.name+'<span style="color:#993C1D;font-size:12px;">　'+(it.spec||"")+'</span></td>'
      +'<td style="color:#712B13;padding:7px 6px;">'+it.wh+'</td>'
      +'<td class="mono" style="color:#712B13;padding:7px 6px;">'+locText(it)+'</td>'
      +'<td style="text-align:right;color:#4A1B0C;padding:7px 6px;">'+it.qty.toLocaleString()+'</td>'
      +'<td style="color:#4A1B0C;padding:7px 6px;">'+it.exp+'</td>'
      +'<td style="text-align:right;font-weight:700;color:'+tx+';padding:7px 6px;">'+dtxt+'</td></tr>';
  });
  soon.innerHTML=h+'</table>';
}

function render(){
  var data=window.__DATA__;
  var q=document.getElementById("q").value.trim().toLowerCase();
  var fw=document.getElementById("wh").value;
  var fl=document.getElementById("lv").value;
  var rows=document.getElementById("rows"); rows.innerHTML="";
  var counts={red:0,amber:0,green:0}, totalQty=0, groups={};
  data.forEach(function(r){
    var lv=level(r);
    if(lv==="red")counts.red++; else if(lv==="amber")counts.amber++; else if(lv==="green")counts.green++;
    totalQty+=r.qty;
    if(q && (r.code+r.name+(r.spec||"")+(r.lot||"")).toLowerCase().indexOf(q)<0) return;
    if(fw && r.wh!==fw) return;
    if(fl && lv!==fl) return;
    (groups[r.code]=groups[r.code]||{name:r.name,spec:r.spec,items:[]}).items.push(Object.assign({},r,{lv:lv}));
  });
  document.getElementById("m-total").textContent=data.length;
  document.getElementById("m-qty").textContent=totalQty.toLocaleString();
  document.getElementById("m-red").textContent=counts.red;
  document.getElementById("m-amber").textContent=counts.amber;
  document.getElementById("m-green").textContent=counts.green;
  var keys=Object.keys(groups);
  if(!keys.length){ rows.innerHTML='<p class="empty">沒有符合條件的品項。</p>'; return; }
  keys.forEach(function(code){
    var g=groups[code], grpQty=g.items.reduce(function(s,it){return s+it.qty;},0);
    var card=document.createElement("div"); card.className="item-card";
    var head='<div class="item-head"><span><span class="item-name">'+g.name+'</span><span class="item-spec">'+g.spec+'</span></span>'
      +'<span class="item-meta">'+code+'　·　小計 '+grpQty.toLocaleString()+'</span></div>';
    var body='<table><tr><th>批號</th><th>倉別</th><th>儲位（主/副）</th><th style="text-align:right;">數量</th><th>效期</th><th style="text-align:center;">狀態</th></tr>';
    g.items.sort(function(a,b){
      var ax=hasExp(a)?monthsLeft(a.exp):Infinity, bx=hasExp(b)?monthsLeft(b.exp):Infinity;
      return ax-bx;
    }).forEach(function(it){
      body+='<tr>'
        +'<td class="mono">'+lotText(it)+'</td><td>'+it.wh+'</td><td class="mono">'+locText(it)+'</td>'
        +'<td style="text-align:right;">'+it.qty.toLocaleString()+'</td><td>'+expText(it)+'</td>'
        +'<td style="text-align:center;"><span class="badge b-'+it.lv+'">'+LABEL[it.lv]+'</span></td></tr>';
    });
    card.innerHTML=head+body+'</table>';
    rows.appendChild(card);
  });
}

if(USE_GOOGLE_SHEET){
  fetch(SHEET_CSV_URL).then(function(r){return r.text();})
    .then(function(t){ boot(parseCSV(t)); })
    .catch(function(){ boot(DATA); });
}else{
  boot(DATA);
}
</script>
</body>
</html>
