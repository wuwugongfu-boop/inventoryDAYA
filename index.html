<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大亞國際行銷 — 庫存效期儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --green:#1D9E75; --green-d:#0F6E56;
    --bg:#ffffff; --surface:#f5f7f5; --line:#e3e8e3;
    --text:#1c2620; --muted:#5f6b63; --hint:#8a948c;
    --red-bg:#FCEBEB; --red-bd:#E24B4A; --red-tx:#791F1F;
    --amber-bg:#FAEEDA; --amber-bd:#EF9F27; --amber-tx:#633806;
    --green-bg:#EAF3DE; --green-bd:#97C459; --green-tx:#27500A;
    --radius:12px; --radius-sm:8px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:linear-gradient(180deg,#f3f8f5 0%,#ffffff 320px);
    min-height:100vh; color:var(--text);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px; margin:0 auto; padding:28px 20px 60px;}
  header{display:flex; align-items:center; gap:16px; padding-bottom:18px; border-bottom:1px solid var(--line); margin-bottom:24px;}
  .logo{width:52px; height:52px; border-radius:var(--radius-sm); background:linear-gradient(135deg,var(--green),var(--green-d)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:20px; letter-spacing:1px;}
  header h1{margin:0; font-size:20px; font-weight:700;}
  header p{margin:2px 0 0; font-size:13px; color:var(--muted);}
  .updated{margin-left:auto; font-size:12px; color:var(--hint); text-align:right;}
  .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:22px;}
  .card{border-radius:var(--radius-sm); padding:14px 16px;}
  .card .lab{margin:0; font-size:13px;}
  .card .val{margin:4px 0 0; font-size:26px; font-weight:700;}
  .c-neutral{background:var(--surface);} .c-neutral .lab{color:var(--muted);}
  .c-red{background:var(--red-bg);} .c-red .lab{color:#A32D2D;} .c-red .val{color:var(--red-tx);}
  .c-amber{background:var(--amber-bg);} .c-amber .lab{color:#854F0B;} .c-amber .val{color:var(--amber-tx);}
  .c-green{background:var(--green-bg);} .c-green .lab{color:#3B6D11;} .c-green .val{color:var(--green-tx);}
  .soon-box{background:var(--red-bg); border:1px solid #F09595; border-radius:var(--radius); padding:14px 18px; margin-bottom:24px;}
  .soon-box h2{margin:0 0 10px; font-size:15px; font-weight:700; color:var(--red-tx); display:flex; align-items:center; gap:6px;}
  .soon-filter{display:flex; flex-wrap:wrap; gap:18px; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid #F4C0C0;}
  .soon-filter label{display:flex; align-items:center; gap:6px; font-size:13px; color:#712B13; cursor:pointer; user-select:none;}
  .soon-filter input{width:16px; height:16px; accent-color:var(--red-bd); cursor:pointer;}
  .controls{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:18px;}
  input,select{font-family:inherit; font-size:14px; padding:8px 12px; border:1px solid var(--line); border-radius:var(--radius-sm); background:#fff; color:var(--text); height:38px;}
  input:focus,select:focus{outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(29,158,117,.15);}
  #q{flex:1; min-width:200px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{font-weight:500; text-align:left; padding:5px 6px; color:var(--muted);}
  td{padding:7px 6px;}
  .mono{font-family:"SFMono-Regular",Consolas,monospace;}
  .item-card{background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:14px 18px; margin-bottom:14px;}
  .item-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; gap:10px; flex-wrap:wrap;}
  .item-name{font-weight:700; font-size:16px;}
  .item-spec{font-size:13px; color:var(--muted); margin-left:6px;}
  .item-meta{font-size:12px; color:var(--hint);}
  .item-card table tr+tr td{border-top:1px solid var(--line);}
  .badge{display:inline-block; border-radius:var(--radius-sm); padding:2px 9px; font-size:12px; white-space:nowrap;}
  .b-red{background:var(--red-bg); color:var(--red-tx); border:1px solid var(--red-bd);}
  .b-amber{background:var(--amber-bg); color:var(--amber-tx); border:1px solid var(--amber-bd);}
  .b-green{background:var(--green-bg); color:var(--green-tx); border:1px solid var(--green-bd);}
  .b-ok{background:var(--surface); color:var(--muted); border:1px solid var(--line);}
  .b-none{background:var(--surface); color:var(--hint); border:1px solid var(--line);}
  .empty{color:var(--muted); font-size:14px; padding:16px 0;}
  .soon-row td{border-top:1px solid #F4C0C0;}
  .toolbar{display:flex; flex-wrap:wrap; gap:14px 24px; align-items:center; justify-content:space-between; background:var(--surface); border-radius:var(--radius-sm); padding:12px 16px; margin-bottom:18px;}
  .toolbar .tool-label{font-size:13px; color:var(--muted); font-weight:500;}
  .threshold, .export{display:flex; flex-wrap:wrap; gap:10px; align-items:center;}
  .threshold label{display:flex; align-items:center; gap:5px; font-size:13px; color:var(--text);}
  .threshold input{width:54px; height:32px; padding:4px 6px; text-align:center;}
  .dot{display:inline-block; width:10px; height:10px; border-radius:50%;}
  .dot-red{background:var(--red-bd);} .dot-amber{background:var(--amber-bd);} .dot-green{background:var(--green-bd);}
  .btn{font-family:inherit; font-size:13px; height:34px; padding:0 14px; border-radius:var(--radius-sm); border:1px solid var(--green); background:var(--green); color:#fff; cursor:pointer; font-weight:500;}
  .btn:hover{background:var(--green-d); border-color:var(--green-d);}
  .btn-ghost{background:#fff; color:var(--green-d); border-color:var(--green);}
  .btn-ghost:hover{background:var(--green-bg);}
  .btn-link{font-family:inherit; font-size:12px; background:none; border:none; color:var(--muted); cursor:pointer; text-decoration:underline; padding:2px 4px;}
  .btn-link:hover{color:var(--text);}
  .item-card th.sortable{cursor:pointer; user-select:none; white-space:nowrap;}
  .item-card th.sortable:hover{color:var(--green-d);}
  .item-card th .arr{font-size:10px; color:var(--green); margin-left:2px;}
  footer{margin-top:30px; font-size:12px; color:var(--hint); text-align:center;}

  @media (max-width:640px){
    .wrap{padding:18px 12px 48px;}
    header{gap:12px;}
    header h1{font-size:16px;}
    header p{font-size:11px;}
    .updated{display:none;}
    .cards{grid-template-columns:repeat(2,1fr); gap:8px;}
    .card .val{font-size:22px;}
    .soon-filter{gap:10px 14px;}
    .soon-filter label{font-size:13px;}

    /* 即將到期清單：手機改成卡片 */
    .soon-table, .soon-table tbody, .soon-table tr, .soon-table td{display:block; width:100%;}
    .soon-table tr:first-child{display:none;}            /* 隱藏表頭 */
    .soon-table tr.soon-row{
      background:#fff; border:1px solid #F4C0C0; border-radius:10px;
      padding:10px 12px; margin-bottom:10px;
    }
    .soon-table td{
      border:none !important; padding:3px 0 !important;
      display:flex; justify-content:space-between; align-items:baseline; gap:12px;
      text-align:left !important; font-size:14px;
    }
    .soon-table td::before{
      content:attr(data-label); color:#993C1D; font-size:12px;
      font-weight:500; flex:0 0 auto; min-width:42px;
    }
    .soon-table td[data-label="品名"]{
      flex-direction:column; align-items:flex-start; gap:2px;
      border-top:1px solid #F4C0C0 !important; border-bottom:1px solid #F4C0C0 !important;
      padding:6px 0 !important; margin:2px 0;
    }
    .soon-table td[data-label="品名"]{font-weight:500; font-size:15px;}
    .soon-table td[data-label="狀態"]{font-size:15px;}

    /* 下方品號分組表格：手機可橫向捲動，避免擠壓 */
    .item-card{overflow-x:auto; padding:12px 14px;}
    .item-card table{min-width:520px;}
    .item-head{flex-direction:column; gap:2px;}
    .toolbar{flex-direction:column; align-items:stretch; gap:12px;}
    .export .btn{flex:1;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">VA</div>
    <div>
      <h1>大亞國際行銷　庫存效期儀表板</h1>
      <p>Vast Asia International marketing co.,ltd. — 即期商品管理（唯讀檢視）</p>
    </div>
    <div class="updated" id="updated"></div>
  </header>

  <div class="cards">
    <div class="card c-neutral"><p class="lab">總品項</p><p class="val" id="m-total">0</p></div>
    <div class="card c-neutral"><p class="lab">總數量</p><p class="val" id="m-qty">0</p></div>
    <div class="card c-red"><p class="lab" id="lab-red">剩 ≤ 1 個月</p><p class="val" id="m-red">0</p></div>
    <div class="card c-amber"><p class="lab" id="lab-amber">剩 ≤ 3 個月</p><p class="val" id="m-amber">0</p></div>
    <div class="card c-green"><p class="lab" id="lab-green">剩 ≤ 6 個月</p><p class="val" id="m-green">0</p></div>
  </div>

  <div class="soon-box">
    <h2>⚠ 即將到期清單（依到期日排序）</h2>
    <div class="soon-filter">
      <label><input type="checkbox" id="f-over" checked> 已過期</label>
      <label><input type="checkbox" id="f-red"> <span id="lab-f-red">未過期且剩 ≤ 1 個月</span></label>
      <label><input type="checkbox" id="f-amber"> <span id="lab-f-amber">超過 1 個月且剩 ≤ 3 個月</span></label>
      <label><input type="checkbox" id="f-green"> <span id="lab-f-green">超過 3 個月且剩 ≤ 6 個月</span></label>
    </div>
    <div id="soon"></div>
  </div>

  <div class="controls">
    <input id="q" type="text" placeholder="搜尋品號 / 品名 / 規格 / 批號…">
    <select id="wh"><option value="">全部倉別</option></select>
    <select id="lv">
      <option value="">全部效期</option>
      <option value="red">剩 ≤ 紅燈門檻</option>
      <option value="amber">剩 ≤ 黃燈門檻</option>
      <option value="green">剩 ≤ 綠燈門檻</option>
      <option value="ok">超過綠燈門檻</option>
      <option value="none">無效期</option>
    </select>
  </div>

  <div class="toolbar">
    <div class="threshold">
      <span class="tool-label">效期門檻（月）：</span>
      <label><span class="dot dot-red"></span>紅 <input id="th-red" type="number" min="0" step="1" value="1"></label>
      <label><span class="dot dot-amber"></span>黃 <input id="th-amber" type="number" min="0" step="1" value="3"></label>
      <label><span class="dot dot-green"></span>綠 <input id="th-green" type="number" min="0" step="1" value="6"></label>
      <button id="th-reset" class="btn-link" type="button">恢復預設</button>
    </div>
    <div class="export">
      <span class="tool-label">匯出 Excel：</span>
      <button id="exp-filtered" class="btn" type="button">目前結果</button>
      <button id="exp-all" class="btn btn-ghost" type="button">全部資料</button>
    </div>
  </div>

  <div id="rows"></div>

  <footer>資料來源：庫存效期試算表　·　本頁為唯讀檢視，如需更新資料請洽管理人員</footer>
</div>

<script>
/* =========================================================================
   資料來源設定
   -------------------------------------------------------------------------
   方式 A（預設）：直接用下方 DATA 陣列的範例資料。
   方式 B：改讀 Google Sheet。把 USE_GOOGLE_SHEET 設為 true，
           並填入你發佈的 CSV 網址（見隨附說明文件第 2 步）。
   ========================================================================= */
var USE_GOOGLE_SHEET = true;
var SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTK8wPy3m9aCy5XVK6tXKXTaYpGoaW6Ir17yPC1HeHkl7-K-_Mkh0rxydiN1QKhYrBMTkaQI5fj7MiW/pub?gid=838757881&single=true&output=csv";

/* 效期門檻（單位：月）。預設 紅1 / 黃3 / 綠6，畫面上可即時調整 */
var TH = {red:1, amber:3, green:6};
var TH_DEFAULT = {red:1, amber:3, green:6};

/* 範例資料。欄位：品號 品名 規格 倉別 主儲位 副儲位 批號 數量 效期(YYYY-MM-DD) */
var DATA = [
  {code:"VA-1001", name:"高鈣鮮乳", spec:"936ml/瓶", wh:"A倉", loc1:"A-03-12", loc2:"A-03-13", lot:"LOT2406A", qty:120, exp:"2026-06-18"},
  {code:"VA-1001", name:"高鈣鮮乳", spec:"936ml/瓶", wh:"A倉", loc1:"A-03-13", loc2:"", lot:"LOT2405B", qty:64, exp:"2026-08-05"},
  {code:"VA-1042", name:"冷壓初榨橄欖油", spec:"500ml/瓶", wh:"B倉", loc1:"B-01-04", loc2:"B-01-05", lot:"LOT2312X", qty:38, exp:"2026-07-22"},
  {code:"VA-1042", name:"冷壓初榨橄欖油", spec:"500ml/瓶", wh:"B倉", loc1:"B-01-05", loc2:"", lot:"LOT2401Y", qty:90, exp:"2026-11-30"},
  {code:"VA-2210", name:"日式胡麻醬", spec:"240g/瓶 ×12/箱", wh:"A倉", loc1:"A-07-02", loc2:"A-07-03", lot:"LOT2408C", qty:210, exp:"2026-09-12"},
  {code:"VA-2210", name:"日式胡麻醬", spec:"240g/瓶 ×12/箱", wh:"C倉", loc1:"C-02-09", loc2:"", lot:"LOT2403D", qty:55, exp:"2026-06-09"},
  {code:"VA-3055", name:"有機燕麥片", spec:"800g/袋", wh:"C倉", loc1:"C-05-11", loc2:"C-05-12", lot:"LOT2310E", qty:148, exp:"2027-02-01"},
  {code:"VA-3055", name:"有機燕麥片", spec:"800g/袋", wh:"B倉", loc1:"B-04-07", loc2:"", lot:"LOT2402F", qty:33, exp:"2026-08-28"},
  {code:"VA-4180", name:"綜合堅果隨手包", spec:"35g/包 ×24/箱", wh:"A倉", loc1:"A-09-15", loc2:"A-09-16", lot:"LOT2407G", qty:480, exp:"2026-06-30"},
  {code:"VA-5320", name:"冷凍藍莓", spec:"1kg/袋", wh:"D倉(冷凍)", loc1:"D-01-01", loc2:"", lot:"LOT2404H", qty:72, exp:"2026-12-15"}
];

var today = new Date(); today.setHours(0,0,0,0);
function hasExp(it){ return it.exp && it.exp.trim()!=="" && !isNaN(new Date(it.exp)); }
function monthsLeft(exp){ return (new Date(exp)-today)/(1000*60*60*24*30.44); }
function daysLeft(exp){ return Math.round((new Date(exp)-today)/(1000*60*60*24)); }

/* 用日曆方式精確計算兩個日期相差幾年幾月幾日 */
function ymdDiff(fromD, toD){
  var a=new Date(fromD), b=new Date(toD);
  var y=b.getFullYear()-a.getFullYear();
  var m=b.getMonth()-a.getMonth();
  var d=b.getDate()-a.getDate();
  if(d<0){ m-=1; var pm=new Date(b.getFullYear(), b.getMonth(), 0); d+=pm.getDate(); }
  if(m<0){ y-=1; m+=12; }
  return {y:y, m:m, d:d};
}
/* 把年月日組成中文字串，0 的單位自動省略 */
function ymdText(diff){
  var parts=[];
  if(diff.y>0) parts.push(diff.y+" 年");
  if(diff.m>0) parts.push(diff.m+" 個月");
  if(diff.d>0 || parts.length===0) parts.push(diff.d+" 日");
  return parts.join(" ");
}
/* 回傳某品項的剩餘 / 過期文字 */
function remainText(it){
  if(!hasExp(it)) return "無效期";
  var d=daysLeft(it.exp);
  if(d<0) return "已過期 "+ymdText(ymdDiff(it.exp, today));
  if(d===0) return "今日到期";
  return "剩 "+ymdText(ymdDiff(today, it.exp));
}

function level(it){ if(!hasExp(it)) return "none"; var m=monthsLeft(it.exp); if(m<=TH.red) return "red"; if(m<=TH.amber) return "amber"; if(m<=TH.green) return "green"; return "ok"; }
function locText(it){ return (it.loc2 && it.loc2.trim()!=="") ? it.loc1+" / "+it.loc2 : (it.loc1||"—"); }
function lotText(it){ return (it.lot && it.lot.trim()!=="") ? it.lot : "—"; }
function expText(it){ return hasExp(it) ? it.exp : "無效期"; }
var LABEL={red:"≤1個月",amber:"≤3個月",green:"≤6個月",ok:"充足",none:"無效期"};

function parseCSV(text){
  var lines = text.replace(/\r/g,"").split("\n").filter(function(l){return l.trim()!=="";});
  var rows = lines.map(function(line){
    var out=[], cur="", inq=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(ch==='"'){ if(inq && line[i+1]==='"'){cur+='"';i++;} else inq=!inq; }
      else if(ch===',' && !inq){ out.push(cur); cur=""; }
      else cur+=ch;
    }
    out.push(cur); return out;
  });
  rows.shift(); /* 移除標題列 */
  return rows.map(function(c){
    return {code:(c[0]||"").trim(), name:(c[1]||"").trim(), spec:(c[2]||"").trim(),
            wh:(c[3]||"").trim(), loc1:(c[4]||"").trim(), loc2:(c[5]||"").trim(),
            lot:(c[6]||"").trim(), qty:parseInt((c[7]||"0").replace(/[^\d-]/g,""),10)||0,
            exp:(c[8]||"").trim()};
  }).filter(function(r){return r.code!=="" && r.name!=="";});
}

var SORT = {key:null, asc:true};

/* 依目前門檻更新畫面上的文字標籤 */
function updateLabels(){
  document.getElementById("lab-red").textContent="剩 ≤ "+TH.red+" 個月";
  document.getElementById("lab-amber").textContent="剩 ≤ "+TH.amber+" 個月";
  document.getElementById("lab-green").textContent="剩 ≤ "+TH.green+" 個月";
  document.getElementById("lab-f-red").textContent="未過期且剩 ≤ "+TH.red+" 個月";
  document.getElementById("lab-f-amber").textContent="超過 "+TH.red+" 個月且剩 ≤ "+TH.amber+" 個月";
  document.getElementById("lab-f-green").textContent="超過 "+TH.amber+" 個月且剩 ≤ "+TH.green+" 個月";
}

/* 從輸入框讀取門檻、做基本檢查、重畫 */
function applyThreshold(){
  var r=parseInt(document.getElementById("th-red").value,10);
  var a=parseInt(document.getElementById("th-amber").value,10);
  var g=parseInt(document.getElementById("th-green").value,10);
  if(isNaN(r)||r<0) r=TH.red; if(isNaN(a)||a<0) a=TH.amber; if(isNaN(g)||g<0) g=TH.green;
  TH.red=r; TH.amber=a; TH.green=g;
  updateLabels(); renderSoon(); render();
}

/* 匯出 Excel；scope:"filtered" 用目前畫面條件，"all" 用全部 */
function exportExcel(scope){
  var data=window.__DATA__;
  var rowsOut=[];
  var q=document.getElementById("q").value.trim().toLowerCase();
  var fw=document.getElementById("wh").value;
  var fl=document.getElementById("lv").value;
  data.forEach(function(r){
    var lv=level(r);
    if(scope==="filtered"){
      if(q && (r.code+r.name+(r.spec||"")+(r.lot||"")).toLowerCase().indexOf(q)<0) return;
      if(fw && r.wh!==fw) return;
      if(fl && lv!==fl) return;
    }
    var statusLabel = lv==="none"?"無效期":remainText(r);
    rowsOut.push({
      "品號":r.code, "品名":r.name, "規格":r.spec||"", "倉別":r.wh,
      "主儲位":r.loc1||"", "副儲位":r.loc2||"", "批號":r.lot||"",
      "數量":r.qty, "到期日":hasExp(r)?r.exp:"", "剩餘 / 狀態":statusLabel
    });
  });
  if(!rowsOut.length){ alert("沒有可匯出的資料。"); return; }
  var ws=XLSX.utils.json_to_sheet(rowsOut, {header:["品號","品名","規格","倉別","主儲位","副儲位","批號","數量","到期日","剩餘 / 狀態"]});
  ws["!cols"]=[{wch:12},{wch:24},{wch:16},{wch:16},{wch:12},{wch:12},{wch:12},{wch:8},{wch:12},{wch:20}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "庫存效期");
  var d=today;
  var fname="庫存效期_"+(scope==="all"?"全部":"目前結果")+"_"+d.getFullYear()+(""+(d.getMonth()+1)).padStart(2,"0")+(""+d.getDate()).padStart(2,"0")+".xlsx";
  XLSX.writeFile(wb, fname);
}

function boot(data){
  window.__DATA__ = data;
  var whSel=document.getElementById("wh");
  Array.from(new Set(data.map(function(r){return r.wh;}))).forEach(function(w){
    if(!w) return; var o=document.createElement("option"); o.value=w; o.textContent=w; whSel.appendChild(o);
  });
  document.getElementById("updated").textContent = "更新時間：" +
    today.getFullYear()+"/"+(today.getMonth()+1)+"/"+today.getDate();
  document.getElementById("q").addEventListener("input",render);
  whSel.addEventListener("change",render);
  document.getElementById("lv").addEventListener("change",render);
  document.getElementById("f-over").addEventListener("change",renderSoon);
  document.getElementById("f-red").addEventListener("change",renderSoon);
  document.getElementById("f-amber").addEventListener("change",renderSoon);
  document.getElementById("f-green").addEventListener("change",renderSoon);
  document.getElementById("th-red").addEventListener("change",applyThreshold);
  document.getElementById("th-amber").addEventListener("change",applyThreshold);
  document.getElementById("th-green").addEventListener("change",applyThreshold);
  document.getElementById("th-reset").addEventListener("click",function(){
    TH.red=TH_DEFAULT.red; TH.amber=TH_DEFAULT.amber; TH.green=TH_DEFAULT.green;
    document.getElementById("th-red").value=TH.red;
    document.getElementById("th-amber").value=TH.amber;
    document.getElementById("th-green").value=TH.green;
    applyThreshold();
  });
  document.getElementById("exp-filtered").addEventListener("click",function(){exportExcel("filtered");});
  document.getElementById("exp-all").addEventListener("click",function(){exportExcel("all");});
  updateLabels(); renderSoon(); render();
}

function renderSoon(){
  var data=window.__DATA__, soon=document.getElementById("soon");
  var fOver=document.getElementById("f-over").checked;
  var fRed=document.getElementById("f-red").checked;
  var fAmber=document.getElementById("f-amber").checked;
  var fGreen=document.getElementById("f-green").checked;
  if(!fOver && !fRed && !fAmber && !fGreen){ soon.innerHTML='<p style="margin:0;font-size:13px;color:#A32D2D;">請至少勾選一個範圍。</p>'; return; }

  function inRange(r){
    if(r.d<0) return fOver;                  // 已過期
    if(r.m<=TH.red) return fRed;             // 未過期且剩≤紅燈門檻
    if(r.m<=TH.amber) return fAmber;         // 超過紅燈且剩≤黃燈門檻
    if(r.m<=TH.green) return fGreen;         // 超過黃燈且剩≤綠燈門檻
    return false;                            // 超過綠燈門檻不列入
  }

  var list=data.filter(hasExp).map(function(r){return Object.assign({},r,{m:monthsLeft(r.exp),d:daysLeft(r.exp)});})
               .filter(inRange).sort(function(a,b){return a.d-b.d;});
  if(!list.length){ soon.innerHTML='<p style="margin:0;font-size:13px;color:#A32D2D;">所選範圍內目前沒有品項。</p>'; return; }

  var h='<table class="soon-table"><tr style="color:#993C1D;text-align:left;">'
    +'<th style="font-weight:500;padding:5px 6px;">品號</th>'
    +'<th style="font-weight:500;padding:5px 6px;">品名</th>'
    +'<th style="font-weight:500;padding:5px 6px;">倉別</th>'
    +'<th style="font-weight:500;padding:5px 6px;">儲位</th>'
    +'<th style="font-weight:500;padding:5px 6px;text-align:right;">數量</th>'
    +'<th style="font-weight:500;padding:5px 6px;">到期日</th>'
    +'<th style="font-weight:500;padding:5px 6px;text-align:right;">狀態</th></tr>';
  list.forEach(function(it){
    var tx=it.m<=1?"var(--red-tx)":(it.m<=3?"var(--amber-tx)":"var(--green-tx)");
    var dtxt = remainText(it);
    h+='<tr class="soon-row">'
      +'<td data-label="品號" class="mono" style="color:#712B13;padding:7px 6px;">'+it.code+'</td>'
      +'<td data-label="品名" style="color:#4A1B0C;padding:7px 6px;">'+it.name+'<span style="color:#993C1D;font-size:12px;">　'+(it.spec||"")+'</span></td>'
      +'<td data-label="倉別" style="color:#712B13;padding:7px 6px;">'+it.wh+'</td>'
      +'<td data-label="儲位" class="mono" style="color:#712B13;padding:7px 6px;">'+locText(it)+'</td>'
      +'<td data-label="數量" style="text-align:right;color:#4A1B0C;padding:7px 6px;">'+it.qty.toLocaleString()+'</td>'
      +'<td data-label="到期日" style="color:#4A1B0C;padding:7px 6px;">'+it.exp+'</td>'
      +'<td data-label="狀態" style="text-align:right;font-weight:700;color:'+tx+';padding:7px 6px;">'+dtxt+'</td></tr>';
  });
  soon.innerHTML=h+'</table>';
}

function render(){
  var data=window.__DATA__;
  var q=document.getElementById("q").value.trim().toLowerCase();
  var fw=document.getElementById("wh").value;
  var fl=document.getElementById("lv").value;
  var rows=document.getElementById("rows"); rows.innerHTML="";
  var counts={red:0,amber:0,green:0}, totalQty=0, groups={};
  data.forEach(function(r){
    var lv=level(r);
    if(lv==="red")counts.red++; else if(lv==="amber")counts.amber++; else if(lv==="green")counts.green++;
    totalQty+=r.qty;
    if(q && (r.code+r.name+(r.spec||"")+(r.lot||"")).toLowerCase().indexOf(q)<0) return;
    if(fw && r.wh!==fw) return;
    if(fl && lv!==fl) return;
    (groups[r.code]=groups[r.code]||{name:r.name,spec:r.spec,items:[]}).items.push(Object.assign({},r,{lv:lv}));
  });
  document.getElementById("m-total").textContent=data.length;
  document.getElementById("m-qty").textContent=totalQty.toLocaleString();
  document.getElementById("m-red").textContent=counts.red;
  document.getElementById("m-amber").textContent=counts.amber;
  document.getElementById("m-green").textContent=counts.green;
  var keys=Object.keys(groups);
  if(!keys.length){ rows.innerHTML='<p class="empty">沒有符合條件的品項。</p>'; return; }

  function arrow(key){ return SORT.key===key ? '<span class="arr">'+(SORT.asc?"▲":"▼")+'</span>' : ''; }
  function sortItems(items){
    var k=SORT.key;
    if(!k) return items.sort(function(a,b){
      var ax=hasExp(a)?monthsLeft(a.exp):Infinity, bx=hasExp(b)?monthsLeft(b.exp):Infinity; return ax-bx;
    });
    return items.sort(function(a,b){
      var av, bv;
      if(k==="qty"){ av=a.qty; bv=b.qty; }
      else if(k==="exp"){ av=hasExp(a)?new Date(a.exp).getTime():Infinity; bv=hasExp(b)?new Date(b.exp).getTime():Infinity; }
      else { av=(a[k]||"").toString(); bv=(b[k]||"").toString(); return SORT.asc? av.localeCompare(bv): bv.localeCompare(av); }
      return SORT.asc? av-bv : bv-av;
    });
  }

  keys.forEach(function(code){
    var g=groups[code], grpQty=g.items.reduce(function(s,it){return s+it.qty;},0);
    var card=document.createElement("div"); card.className="item-card";
    var head='<div class="item-head"><span><span class="item-name">'+g.name+'</span><span class="item-spec">'+g.spec+'</span></span>'
      +'<span class="item-meta">'+code+'　·　小計 '+grpQty.toLocaleString()+'</span></div>';
    var body='<table><tr>'
      +'<th class="sortable" data-sort="lot">批號'+arrow("lot")+'</th>'
      +'<th class="sortable" data-sort="wh">倉別'+arrow("wh")+'</th>'
      +'<th>儲位（主/副）</th>'
      +'<th class="sortable" data-sort="qty" style="text-align:right;">數量'+arrow("qty")+'</th>'
      +'<th class="sortable" data-sort="exp">效期'+arrow("exp")+'</th>'
      +'<th style="text-align:center;">狀態 / 剩餘</th></tr>';
    sortItems(g.items).forEach(function(it){
      var statusCell;
      if(it.lv==="none"){
        statusCell='<span class="badge b-none">無效期</span>';
      }else{
        statusCell='<span class="badge b-'+it.lv+'">'+remainText(it)+'</span>';
      }
      body+='<tr>'
        +'<td class="mono">'+lotText(it)+'</td><td>'+it.wh+'</td><td class="mono">'+locText(it)+'</td>'
        +'<td style="text-align:right;">'+it.qty.toLocaleString()+'</td><td>'+expText(it)+'</td>'
        +'<td style="text-align:center;">'+statusCell+'</td></tr>';
    });
    card.innerHTML=head+body+'</table>';
    rows.appendChild(card);
  });

  // 綁定排序標題點擊
  Array.prototype.forEach.call(document.querySelectorAll(".item-card th.sortable"), function(th){
    th.addEventListener("click", function(){
      var k=th.getAttribute("data-sort");
      if(SORT.key===k){ SORT.asc=!SORT.asc; } else { SORT.key=k; SORT.asc=true; }
      render();
    });
  });
}

if(USE_GOOGLE_SHEET){
  fetch(SHEET_CSV_URL).then(function(r){return r.text();})
    .then(function(t){ boot(parseCSV(t)); })
    .catch(function(){ boot(DATA); });
}else{
  boot(DATA);
}
</script>
